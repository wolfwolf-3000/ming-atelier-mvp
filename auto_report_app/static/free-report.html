<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>获取免费报告｜Ming Atelier</title><link rel="stylesheet" href="/pages.css"></head>
<body><header class="top"><nav class="shell nav"><a class="brand" href="/"><img src="/assets/ming-four-pillars-mark.png"><span>Ming Atelier<small>命理工坊</small></span></a><div class="links"><a href="/">首页</a><a href="/site-preview.html">总览</a><a href="/questionnaire.html">问卷</a><a href="/deep-report.html">深度报告</a><a href="/divination.html">起卦</a></div></nav></header>
<section class="hero"><img class="hero-bg" src="/assets/bazi-standalone-site-concept.png"><div class="shell hero-inner"><div><p class="eyebrow">Free BaZi Chart</p><h1>获取免费版排盘报告</h1><p class="lead">免费版包含完整命盘图、神煞和地支关系，以及一段性格、行业、感情的大白话总结。</p></div><div class="hero-card"><h3>边界</h3><p>不展开大运、未来十年、正缘细节和深度风险。那些放在深度报告里。</p></div></div></section>
<section><div class="shell"><form id="reportForm" class="tool fields"><div><label>姓名</label><input name="name" placeholder="用于报告标题"></div><div><label>性别 *</label><select name="gender" required><option value="">请选择</option><option>男</option><option>女</option></select></div><div><label>出生日期 *</label><input type="date" name="birthDate" required></div><div><label>出生时间 *</label><input type="time" name="birthTime" step="60" required></div><div class="full"><label>出生地点 *</label><input name="birthPlace" required placeholder="例如：中国广州天河区"></div><div><label>当前行业</label><input name="industry"></div><div><label>当前角色</label><input name="role"></div><button id="reportSubmit" class="btn primary full" type="submit">生成免费版 PDF 报告</button></form><div class="error" id="reportError"></div><div class="result" id="reportResult"><a id="pdfLink" target="_blank">打开 / 下载免费版 PDF</a><br><a id="chartLink" target="_blank">查看命盘图</a></div></div></section>
<script>const $=id=>document.getElementById(id);async function postJson(url,payload){const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||'请求失败');return data}$('reportForm').addEventListener('submit',async e=>{e.preventDefault();$('reportError').style.display='none';$('reportResult').style.display='none';$('reportSubmit').disabled=true;$('reportSubmit').textContent='生成中...';const payload=Object.fromEntries(new FormData(e.target).entries());payload.calendar='阳历';try{const data=await postJson('/api/report',payload);$('pdfLink').href=data.pdfUrl;$('chartLink').href=data.chartUrl;$('reportResult').style.display='block'}catch(err){$('reportError').textContent=err.message;$('reportError').style.display='block'}finally{$('reportSubmit').disabled=false;$('reportSubmit').textContent='生成免费版 PDF 报告'}});</script>
<footer class="shell">免费报告用于初步体验。</footer></body></html>
