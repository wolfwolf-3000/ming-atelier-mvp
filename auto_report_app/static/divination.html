<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>年月日时起卦｜Ming Atelier</title><link rel="stylesheet" href="/pages.css"></head>
<body><header class="top"><nav class="shell nav"><a class="brand" href="/"><img src="/assets/ming-four-pillars-mark.png"><span>Ming Atelier<small>命理工坊</small></span></a><div class="links"><a href="/">首页</a><a href="/site-preview.html">总览</a><a href="/free-report.html">免费报告</a><a href="/deep-report.html">深度报告</a></div></nav></header>
<section class="hero"><img class="hero-bg" src="/assets/bazi-standalone-site-concept.png"><div class="shell hero-inner"><div><p class="eyebrow">Divination</p><h1>具体问题，用起卦看短期窗口</h1><p class="lead">八字看长期结构，起卦看当前问题、当下时机和行动风险。适合事业、合作、关系、出行、择机。</p></div><div class="hero-card"><h3>问事边界</h3><p>医疗、法律、投资保证类问题不做确定性承诺，高价值问题后续引导人工复核。</p></div></div></section>
<section><div class="shell"><form id="oracleForm" class="tool fields"><div class="full"><label>核心问题 *</label><input name="question" required placeholder="例如：这个合作 2026 年能不能推进？"></div><div><label>地点/时区</label><input name="location" placeholder="洛杉矶 / 北京"></div><div><label>外应</label><input name="omen" placeholder="没有可写无"></div><div class="full"><label>事情背景</label><textarea name="background" placeholder="当前进展、涉及对象、面临选择"></textarea></div><button id="oracleSubmit" class="btn warn full" type="submit">立即起卦</button></form><div class="error" id="oracleError"></div><div class="result" id="oracleResult"></div></div></section>
<script>
const $=id=>document.getElementById(id);
const esc=value=>String(value||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const list=items=>(items||[]).map(item=>`<li>${esc(item)}</li>`).join('');
async function postJson(url,payload){const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||'请求失败');return data}
$('oracleForm').addEventListener('submit',async e=>{e.preventDefault();$('oracleError').style.display='none';$('oracleResult').style.display='none';$('oracleSubmit').disabled=true;$('oracleSubmit').textContent='起卦中...';try{const data=await postJson('/api/divination',Object.fromEntries(new FormData(e.target).entries()));const r=data.result;$('oracleResult').innerHTML=`<strong>判断：${esc(r.verdict)}｜${esc(r.verdictTone)}</strong><br>${esc(r.baseHexagram)}，${esc(r.movingLine)}爻动，变${esc(r.changedHexagram)}；互卦：${esc(r.mutualHexagram)}<br>问题类型：${esc(r.topic)}<br>体用：${esc(r.body)} / ${esc(r.use)}；${esc(r.relation)}<br>${esc(r.relationText)}<br>${esc(r.seasonText)}<br>${esc(r.movementText)}<br>达成度：${esc(r.success)}；风险：${esc(r.risk)}；置信度：${esc(r.confidence)}<br>行动窗口：${esc(r.actionWindow)}<br><p>${esc(r.questionReading||r.summary)}</p><ul>${list(r.advice)}</ul><ul>${list(r.riskPoints)}</ul>`;$('oracleResult').style.display='block'}catch(err){$('oracleError').textContent=err.message;$('oracleError').style.display='block'}finally{$('oracleSubmit').disabled=false;$('oracleSubmit').textContent='立即起卦'}});
</script>
<footer class="shell">起卦用于短期决策辅助。</footer></body></html>
