<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>年月日时起卦｜Ming Atelier</title><link rel="stylesheet" href="/pages.css"></head>
<body><header class="top"><nav class="shell nav"><a class="brand" href="/"><img src="/assets/ming-four-pillars-mark.png"><span>Ming Atelier<small>命理工坊</small></span></a><div class="links"><a href="/">首页</a><a href="/site-preview.html">总览</a><a href="/free-report.html">免费报告</a><a href="/deep-report.html">深度报告</a></div></nav></header>
<section class="hero"><img class="hero-bg" src="/assets/bazi-standalone-site-concept.png"><div class="shell hero-inner"><div><p class="eyebrow">Divination</p><h1>具体问题，用起卦看短期窗口</h1><p class="lead">八字看长期结构，起卦看当前问题、当下时机和行动风险。适合事业、合作、关系、出行、择机。</p></div><div class="hero-card"><h3>问事边界</h3><p>医疗、法律、投资保证类问题不做确定性承诺，高价值问题后续引导人工复核。</p></div></div></section>
<section><div class="shell"><form id="oracleForm" class="tool fields"><div class="full"><label>核心问题 *</label><input name="question" required placeholder="例如：这个合作 2026 年能不能推进？"></div><div><label>地点/时区</label><input name="location" placeholder="洛杉矶 / 北京"></div><div><label>外应</label><input name="omen" placeholder="没有可写无"></div><div class="full"><label>事情背景</label><textarea name="background" placeholder="当前进展、涉及对象、面临选择"></textarea></div><button id="oracleSubmit" class="btn warn full" type="submit">立即起卦</button></form><div class="error" id="oracleError"></div><div class="result" id="oracleResult"></div></div></section>
<script>
const pageLang=new URLSearchParams(location.search).get('lang')==='en'?'en':'zh';
if(pageLang==='en'){
document.documentElement.lang='en';document.title='Mei Hua Divination | Ming Atelier';
const pairs=[['首页','Home'],['总览','Overview'],['免费报告','Free Reading'],['深度报告','Deep Report'],['具体问题，用起卦看短期窗口','Use divination for a specific short-term question'],['八字看长期结构，起卦看当前问题、当下时机和行动风险。适合事业、合作、关系、出行、择机。','BaZi reads long-term structure. Divination reads the current question, timing, and action risk. Suitable for career, partnership, relationship, travel, and timing choices.'],['问事边界','Boundary'],['医疗、法律、投资保证类问题不做确定性承诺，高价值问题后续引导人工复核。','Medical, legal, and guaranteed-investment questions do not receive certainty claims. High-value matters should go through human review.'],['核心问题 *','Core question *'],['地点/时区','Location / timezone'],['外应','Omen'],['事情背景','Background'],['立即起卦','Cast Divination'],['起卦用于短期决策辅助。','Divination is for short-term decision support.']];
document.body.innerHTML=pairs.reduce((html,[from,to])=>html.split(from).join(to),document.body.innerHTML);
}
const $=id=>document.getElementById(id);
const esc=value=>String(value||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const list=items=>(items||[]).map(item=>`<li>${esc(item)}</li>`).join('');
const localStamp=date=>`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}T${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
async function postJson(url,payload){const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||(pageLang==='en'?'Request failed':'请求失败'));return data}
$('oracleForm').addEventListener('submit',async e=>{e.preventDefault();$('oracleError').style.display='none';$('oracleResult').style.display='none';$('oracleSubmit').disabled=true;$('oracleSubmit').textContent=pageLang==='en'?'Casting...':'起卦中...';try{const now=new Date();const payload=Object.fromEntries(new FormData(e.target).entries());payload.lang=pageLang;payload.divinationLocal=localStamp(now);payload.timezone=Intl.DateTimeFormat().resolvedOptions().timeZone||'';payload.utcOffsetMinutes=String(-now.getTimezoneOffset());const data=await postJson('/api/divination',payload);const r=data.result;const labels=pageLang==='en'?{verdict:'Verdict',question:'Question',time:'Cast time',topic:'Topic',hex:'Hexagram',body:'Body/Use',energy:'Energy',success:'Success',window:'Action window',reading:'Reading',advice:'Advice',risk:'Risk Boundaries'}:{verdict:'判断',question:'所问事情',time:'起卦时间',topic:'问题类型',hex:'卦象',body:'体用',energy:'能量校准',success:'达成度',window:'行动窗口',reading:'具体解读',advice:'行动建议',risk:'风险边界'};$('oracleResult').innerHTML=`<h3>${labels.verdict}：${esc(r.verdict)}｜${esc(r.verdictTone)}</h3><p>${esc(r.summary)}</p><div class="table-wrap"><table><tbody><tr><th>${labels.question}</th><td>${esc(r.question)}</td></tr><tr><th>${labels.time}</th><td>${esc(r.time)}｜${esc(r.timezone)}｜${esc(r.timeSource)}</td></tr><tr><th>${labels.topic}</th><td>${esc(r.topic)}｜${esc(r.topicCalibration)}</td></tr><tr><th>${labels.hex}</th><td>${esc(r.baseHexagram)}，${esc(r.movingLine)} moving line，mutual ${esc(r.mutualHexagram)}，changes to ${esc(r.changedHexagram)}</td></tr><tr><th>${labels.body}</th><td>${esc(r.body)} / ${esc(r.use)}；${esc(r.relation)}。${esc(r.relationText)}</td></tr><tr><th>${labels.energy}</th><td>${esc(r.seasonText)} ${esc(r.energyText)}</td></tr><tr><th>${labels.success}</th><td>${esc(r.success)}；Risk ${esc(r.risk)}；Confidence ${esc(r.confidence)}；Benefit/loss ${esc(r.benefitLossRatio)}</td></tr><tr><th>${labels.window}</th><td>${esc(r.actionWindow)}</td></tr></tbody></table></div><h3>${labels.reading}</h3><p>${esc(r.questionReading||r.summary)}</p><h3>${labels.advice}</h3><ul>${list(r.advice)}</ul><h3>${labels.risk}</h3><ul>${list(r.riskPoints)}</ul>`;$('oracleResult').style.display='block'}catch(err){$('oracleError').textContent=err.message;$('oracleError').style.display='block'}finally{$('oracleSubmit').disabled=false;$('oracleSubmit').textContent=pageLang==='en'?'Cast Divination':'立即起卦'}});
</script>
<footer class="shell">起卦用于短期决策辅助。</footer></body></html>
